const firstNum = s => { const m = (s || "").match(/\d+(\.\d+)?/); return m ? parseFloat(m[0]) : 0; };
const isComp = n => /squat|dead|bench|press|row|swing|thrust|lunge|rdl/i.test(n);
const fmtT = s => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, "0")}`;
const ytURL = q => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`;
const HKEY = "ghv6";
const PHASE_ACCENT = { p1: "#4ade80", p2: "#fbbf24", p3: "#f87171" };

// Estimated 1RM (Epley) — best single progress signal since it blends load and reps
const e1RM = e => e.w * (1 + e.r / 30);
const bestE1 = sets => sets.length ? Math.round(Math.max(...sets.map(e1RM)) * 10) / 10 : 0;

// Bring older single-session history entries up to the sessions[] schema on load
const migrate = h => {
  const out = { ...h };
  Object.keys(out).forEach(k => {
    const e = out[k];
    if (e && !e.sessions) {
      out[k] = {
        ...e,
        sessions: e.ls?.length
          ? [{ date: e.ld || "", ts: 0, sets: e.ls, vol: e.ls.reduce((s, x) => s + x.w * x.r, 0), top: Math.max(...e.ls.map(x => x.w)), e1rm: bestE1(e.ls) }]
          : [],
      };
    }
  });
  return out;
};

  if (/swing/.test(n)) return ["DB Deadlift", "Hip Thrust", "Good Morning"];
  if (/bench|floor press|push.?up|incline/.test(n)) return ["DB Floor Press", "Push-up", "Incline DB Press"];

// ─── Animated GIF lookup (ExerciseGymGifsDB via jsDelivr, no key, CORS-ok) ─────
const GIFBASE = "https://cdn.jsdelivr.net/gh/JahelCuadrado/ExerciseGymGifsDB@v1.1.0";
const _grpCache = {};
const _matchCache = {};

const fetchGroup = async mg => {
  if (_grpCache[mg] !== undefined) return _grpCache[mg];
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 8000);
  try {
    const r = await fetch(`${GIFBASE}/api/en/muscles/${mg}.json`, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) return (_grpCache[mg] = []);
    const d = await r.json();
    return (_grpCache[mg] = d.exercises || []);
  } catch { clearTimeout(t); return (_grpCache[mg] = []); }
};

// Returns { entry, reason } so the modal can report exactly what happened.
// reason: "ok" | "by-design" (rehab, no mg) | "fetch-failed" (library unreachable) | "no-match"
const findGif = async ex => {
  if (!ex.mg || !ex.gk?.length) return { entry: null, reason: "by-design" };
  const cacheKey = ex.n;
  if (_matchCache[cacheKey] !== undefined) return _matchCache[cacheKey];
  const primary = ex.gk[0];
  let seen = 0;
  for (const g of ex.mg) {
    const list = await fetchGroup(g);
    seen += list.length;
    if (!list.length) continue;
    const named = list.filter(c => ex.gk.some(k => c.name.toLowerCase().includes(k)));
    const prim = named.filter(c => c.name.toLowerCase().includes(primary));
    const use = prim.length ? prim : named;
    if (use.length) {
      use.sort((a, b) => {
        const ae = ex.eq && a.equipment === ex.eq ? 0 : 1;
        const be = ex.eq && b.equipment === ex.eq ? 0 : 1;
        if (ae !== be) return ae - be;
        return a.name.length - b.name.length;
      });
      return (_matchCache[cacheKey] = { entry: use[0], reason: "ok" });
    }
  }
  return (_matchCache[cacheKey] = { entry: null, reason: seen === 0 ? "fetch-failed" : "no-match" });
};

const calcNext = (logged, pReps, pRPE, name) => {
  if (!logged.length) return null;
  const last = logged[logged.length - 1];
  const misses = logged.filter(s => s.r < pReps - 1 || s.rpe > pRPE + 1).length;
  const bump = isComp(name) ? 2.5 : 1.25;
  if (last.rpe <= pRPE - 2 || last.r >= pReps + 2)
    return { w: last.w + bump, note: `Light. Bumping +${bump}kg.` };
  if (last.r < pReps - 1 || last.rpe > pRPE + 1) {
    if (misses >= 2) return { w: Math.round(last.w * 0.9 * 2) / 2, note: "Two misses. Dropped 10%." };
    return { w: last.w, note: "Tough set. Hold weight." };
  }
  return { w: last.w, note: "On target. Same weight." };
};

// ─── Sparkline (dependency-free SVG line chart of est 1RM over sessions) ───────
function Spark({ data, accent, w = 150, h = 44 }) {
  if (!data || data.length < 2) {
    return <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#333" }}>Log 2+ sessions for a trend</div>;
  }
  const min = Math.min(...data), max = Math.max(...data);
  const rng = max - min || 1;
  const pad = 4;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = pad + (1 - (v - min) / rng) * (h - pad * 2);
    return [x, y];
  });
  const line = pts.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const last = pts[pts.length - 1];
  return (
    <svg width={w} height={h} style={{ display: "block" }}>
      <polyline points={line} fill="none" stroke={accent} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      {pts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r={i === pts.length - 1 ? 3 : 1.5} fill={i === pts.length - 1 ? accent : "#333"} />
      ))}
      <circle cx={last[0]} cy={last[1]} r="6" fill="none" stroke={accent} strokeWidth="1" opacity="0.4" />
    </svg>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function GymApp() {
  const BB = { fontFamily: "'Bebas Neue', sans-serif" };
  const MN = { fontFamily: "'JetBrains Mono', monospace" };

  const [mode, setMode] = useState("program");
  const [ph, setPh] = useState("p1");
  const [day, setDay] = useState("A");
  const [demoEx, setDemoEx] = useState(null);

  // Session
  const [sExs, setSExs] = useState([]);
  const [aIdx, setAIdx] = useState(0);
  const [sStart, setSStart] = useState(null);
  const [sdone, setSdone] = useState(false);

  // Log inputs
  const [lw, setLw] = useState("");
  const [lr, setLr] = useState("");
  const [lrpe, setLrpe] = useState(8);

  // Swap
  const [swapping, setSwapping] = useState(false);
  const [swapName, setSwapName] = useState("");
  const [swapLoad, setSwapLoad] = useState("");

  // Rest timer
  const [tmr, setTmr] = useState({ on: false, s: 90, total: 90 });
  const tmrRef = useRef(null);

  // History
  const [hist, setHist] = useState({});
  const [openHk, setOpenHk] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const r = localStorage.getItem(HKEY);
        if (r) setHist(migrate(JSON.parse(r)));
      } catch {}
    })();
  }, []);

  useEffect(() => {
    if (tmr.on && tmr.s > 0) {
      tmrRef.current = setTimeout(() => setTmr(t => ({ ...t, s: t.s - 1 })), 1000);
    } else if (tmr.on && tmr.s === 0) {
      setTmr(t => ({ ...t, on: false }));
    }
    return () => clearTimeout(tmrRef.current);
  }, [tmr.on, tmr.s]);

  const pd = PH[ph];
  const dd = pd.days[day];
  const acc = pd.accent;

  const advanceFrom = (upd, fromIdx) => {
    const ni = upd.findIndex((e, i) => i > fromIdx && e.status === "pending");
    if (ni !== -1) { upd[ni] = { ...upd[ni], status: "active" }; return ni; }
    return fromIdx;
  };

  const startSession = () => {
    const exs = dd.ss.flatMap(ss =>
      ss.ex.map(ex => ({
        ...ex, ssId: ss.id, rest: ss.rest,
        logged: [], status: "pending", nextW: firstNum(ex.load), vol: 0, note: ""
      }))
    );
    if (exs.length) exs[0].status = "active";
    setSExs(exs); setAIdx(0); setSStart(Date.now()); setSdone(false);
    setLw(""); setLr(""); setLrpe(8); setSwapping(false);
    setMode("session");
  };

  const handleLog = () => {
    const w = parseFloat(lw), r = parseInt(lr);
    if (!w || !r || w <= 0 || r <= 0) return;

    const upd = [...sExs];
    const ex = { ...upd[aIdx] };
    const pR = parseInt(ex.r) || 10;
    const pRPE = ex.rpe || 8;
    const hk = `${ph}_${day}_${ex.n}`;

    const entry = { w, r, rpe: lrpe };
    if (hist[hk]?.bv && w * r > hist[hk].bv) entry.pr = true;

    const newLogged = [...ex.logged, entry];
    const nxt = calcNext(newLogged, pR, pRPE, ex.n);

    ex.logged = newLogged;
    ex.nextW = nxt ? nxt.w : w;
    ex.note = nxt ? nxt.note : "";
    ex.vol = newLogged.reduce((s, e) => s + e.w * e.r, 0);

    let newAIdx = aIdx;
    if (newLogged.length >= ex.s) {
      ex.status = "done";
      upd[aIdx] = ex;
      newAIdx = advanceFrom(upd, aIdx);
    } else {
      upd[aIdx] = ex;
    }
    setSExs(upd); setAIdx(newAIdx);
    setTmr({ on: true, s: ex.rest, total: ex.rest });
    setLw(""); setLr("");
  };

  const skipActive = () => {
    const upd = [...sExs];
    upd[aIdx] = { ...upd[aIdx], status: "skipped" };
    const newAIdx = advanceFrom(upd, aIdx);
    setSExs(upd); setAIdx(newAIdx); setSwapping(false);
    setTmr(t => ({ ...t, on: false }));
  };

  const restoreSkipped = idx => {
    const upd = [...sExs];
    upd[idx] = { ...upd[idx], status: sExs.some(e => e.status === "active") ? "pending" : "active" };
    setSExs(upd);
    if (upd[idx].status === "active") setAIdx(idx);
  };

  const confirmSwap = () => {
    const nm = swapName.trim();
    if (!nm) return;
    const g = inferDemo(nm);
    const upd = [...sExs];
    const cur = upd[aIdx];
    upd[aIdx] = {
      ...cur, n: nm, load: swapLoad.trim() || cur.load,
      ytq: g.ytq, mg: g.mg, eq: g.eq, gk: g.gk, swapped: true,
      nextW: firstNum(swapLoad) || cur.nextW,
    };
    setSExs(upd); setSwapping(false); setSwapName(""); setSwapLoad("");
  };

  const endSession = async () => {
    const nh = { ...hist };
    const today = new Date().toLocaleDateString("en-AU");
    const ts = Date.now();
    sExs.forEach(ex => {
      if (!ex.logged.length) return; // skip skipped / unlogged
      const hk = `${ph}_${day}_${ex.n}`;
      const vol = ex.logged.reduce((s, e) => s + e.w * e.r, 0);
      const top = Math.max(...ex.logged.map(e => e.w));
      const prev = nh[hk] || {};
      const sessions = (prev.sessions || [])
        .concat([{ date: today, ts, sets: ex.logged, vol, top, e1rm: bestE1(ex.logged) }])
        .slice(-60);
      nh[hk] = { ls: ex.logged, ld: today, bv: Math.max(vol, prev.bv || 0), sessions };
    });
    setHist(nh);
    try { localStorage.setItem(HKEY, JSON.stringify(nh)); } catch {}
    setSdone(true);
  };

  const totalVol = sExs.reduce((s, e) => s + e.vol, 0);
  const doneCount = sExs.filter(e => e.status === "done").length;
  const skipCount = sExs.filter(e => e.status === "skipped").length;
  const durMin = sStart ? Math.floor((Date.now() - sStart) / 60000) : 0;

  // History rows, most-recently trained first
  const histRows = Object.entries(hist)
    .filter(([, v]) => v.sessions && v.sessions.length)
    .map(([k, v]) => {
      const parts = k.split("_");
      const p = parts[0], d = parts[1], name = parts.slice(2).join("_");
      const s = v.sessions;
      const lastTs = s[s.length - 1].ts || 0;
      return { key: k, p, d, name, s, lastTs };
    })
    .sort((a, b) => b.lastTs - a.lastTs);

  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", background: "#0c0c0c", minHeight: "100vh", color: "#e8e8e8", maxWidth: 480, margin: "0 auto", paddingBottom: 100 }}>
      <style>{G}</style>

        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 3, height: 22, background: acc, borderRadius: 2 }} />
          <span style={{ ...BB, fontSize: 19, letterSpacing: 3, color: "#fff" }}>HOME GYM</span>
        </div>
        <div style={{ display: "flex", gap: 5 }}>
          {[["program", "PROGRAM"], ["session", sExs.length && !sdone ? "SESSION ●" : "SESSION"], ["history", "HISTORY"]].map(([m, label]) => (
            <button key={m}

              style={{ padding: "7px 10px", background: mode === m ? acc : "transparent", border: `1px solid ${mode === m ? acc : "#333"}`, borderRadius: 6, color: mode === m ? "#000" : "#555", fontSize: 10, fontWeight: 700, ...BB, letterSpacing: 1 }}>

                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <button onClick={() => setTmr(t => ({ ...t, s: Math.max(0, t.s - 30) }))}
                  style={{ background: "#1a1a1a", border: "1px solid #252525", borderRadius: 6, padding: "7px 12px", color: "#666", ...MN, fontSize: 12 }}>−30s</button>
                <button onClick={() => setTmr(t => ({ ...t, on: false }))}
                  style={{ background: "#1a1a1a", border: "1px solid #252525", borderRadius: 6, padding: "7px 12px", color: "#666", fontSize: 12 }}>Skip</button>
              </div>
            </div>
          )}

          {!sdone && sExs.map((ex, idx) => {
            const isA = ex.status === "active";
            const isD = ex.status === "done";
            const isS = ex.status === "skipped";
            const pR = parseInt(ex.r) || 10;
            const hk = `${ph}_${day}_${ex.n}`;
            const lastSets = hist[hk]?.ls;
            const lastDate = hist[hk]?.ld;

            return (
              <div key={idx} style={{ marginBottom: 8, border: `1px solid ${isA ? acc + "55" : isD ? "#1e3a1e" : isS ? "#2a1a1a" : "#1a1a1a"}`, borderRadius: 12, overflow: "hidden", opacity: isS ? 0.6 : 1 }}
                className={isA ? "slide-up" : ""}>

                <div style={{ background: isA ? "#0d120d" : isD ? "#080f08" : isS ? "#100a0a" : "#0a0a0a", padding: "12px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 14, color: isD ? "#4ade80" : isA ? acc : isS ? "#a55" : "#252525", minWidth: 16 }}>
                      {isD ? "✓" : isA ? "▶" : isS ? "⤼" : "○"}
                    </span>
                    <div>
                      <button onClick={() => setDemoEx(ex)} style={{ background: "none", padding: 0, textAlign: "left", display: "flex", alignItems: "center", gap: 5 }}>
                        <span style={{ fontWeight: 600, fontSize: 14, color: isA ? "#fff" : isD ? "#4ade80" : "#555", textDecoration: isS ? "line-through" : "none" }}>{ex.n}</span>
                        {!isS && <span style={{ fontSize: 10, color: isA ? `${acc}99` : "#333" }}>▶</span>}
                        {ex.swapped && <span style={{ ...MN, fontSize: 8, color: acc, border: `1px solid ${acc}55`, borderRadius: 3, padding: "1px 4px" }}>SWAP</span>}
                      </button>
                      <div style={{ ...MN, fontSize: 10, color: "#2a2a2a", marginTop: 1 }}>{ex.ssId} · {ex.load}</div>
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    {isS ? (
                      <button onClick={() => restoreSkipped(idx)} style={{ ...MN, fontSize: 10, color: "#a55", background: "#1a1010", border: "1px solid #2a1a1a", borderRadius: 5, padding: "4px 8px" }}>restore</button>
                    ) : (
                      <>
                        <div style={{ ...MN, fontSize: 12, color: isD ? "#4ade80" : "#444" }}>{ex.logged.length}/{ex.s}</div>
                        {ex.vol > 0 && <div style={{ ...MN, fontSize: 10, color: "#2a2a2a" }}>{ex.vol.toFixed(0)}kg</div>}
                      </>
                    )}
                  </div>
                </div>

                {isA && (
                  <div style={{ background: "#090909", padding: "14px" }}>

                    {/* Swap / Skip controls */}
                    <div style={{ display: "flex", gap: 6, justifyContent: "flex-end", marginBottom: 12 }}>
                      <button onClick={() => { setSwapping(s => !s); setSwapName(""); setSwapLoad(""); }}
                        style={{ ...MN, fontSize: 11, color: swapping ? "#000" : "#888", background: swapping ? acc : "#151515", border: `1px solid ${swapping ? acc : "#252525"}`, borderRadius: 6, padding: "7px 14px" }}>⇄ Swap</button>
                      <button onClick={skipActive}
                        style={{ ...MN, fontSize: 11, color: "#a55", background: "#151010", border: "1px solid #2a1a1a", borderRadius: 6, padding: "7px 14px" }}>⤼ Skip</button>
                    </div>

                    {/* Swap panel */}
                    {swapping && (
                      <div className="fade-in" style={{ background: "#0c0c0c", border: `1px solid ${acc}33`, borderRadius: 10, padding: "12px", marginBottom: 14 }}>
                        <div style={{ ...BB, fontSize: 10, letterSpacing: 3, color: acc, marginBottom: 8 }}>SWAP THIS EXERCISE</div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10 }}>
                          {altsFor(ex.n).map(a => (
                            <button key={a} onClick={() => setSwapName(a)}
                              style={{ fontSize: 12, color: swapName === a ? "#000" : "#999", background: swapName === a ? acc : "#151515", border: `1px solid ${swapName === a ? acc : "#252525"}`, borderRadius: 6, padding: "7px 11px", fontWeight: 600 }}>{a}</button>
                          ))}
                        </div>
                        <input type="text" value={swapName} onChange={e => setSwapName(e.target.value)} placeholder="or type any exercise"
                          style={{ width: "100%", background: "#111", border: "1px solid #252525", borderRadius: 8, padding: "11px", color: "#fff", fontSize: 15, fontFamily: "'DM Sans', sans-serif", marginBottom: 8 }} />
                        <input type="text" value={swapLoad} onChange={e => setSwapLoad(e.target.value)} placeholder={`load (default: ${ex.load})`}
                          style={{ width: "100%", background: "#111", border: "1px solid #252525", borderRadius: 8, padding: "11px", color: "#fff", fontSize: 14, ...MN, marginBottom: 10 }} />
                        <div style={{ display: "flex", gap: 6 }}>
                          <button onClick={() => setSwapping(false)} style={{ flex: 1, background: "#151515", border: "1px solid #252525", borderRadius: 8, padding: "11px", color: "#666", fontSize: 13 }}>Cancel</button>
                          <button onClick={confirmSwap} disabled={!swapName.trim()}
                            style={{ flex: 2, background: swapName.trim() ? acc : "#1a1a1a", border: "none", borderRadius: 8, padding: "11px", color: swapName.trim() ? "#000" : "#444", fontSize: 14, fontWeight: 700, ...BB, letterSpacing: 1 }}>SWAP IN</button>
                        </div>
                        <div style={{ ...MN, fontSize: 9, color: "#333", marginTop: 8, lineHeight: 1.5 }}>Keeps your {ex.s}×{ex.r} target. Logs under the new name so it gets its own history.</div>
                      </div>
                    )}

                    {lastSets?.length > 0 && (
                      <div style={{ background: "#0c0c0c", border: "1px solid #161616", borderRadius: 8, padding: "8px 10px", marginBottom: 12 }}>
                        <div style={{ ...BB, fontSize: 9, letterSpacing: 3, color: "#2a2a2a", marginBottom: 5 }}>LAST SESSION · {lastDate}</div>
                        <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                          {lastSets.map((s, i) => (
                            <span key={i} style={{ ...MN, fontSize: 11, color: "#555", background: "#141414", padding: "2px 8px", borderRadius: 4 }}>{s.w}×{s.r}@{s.rpe}</span>
                          ))}
                        </div>
                      </div>
                    )}

                    {ex.logged.length > 0 && (
                      <div style={{ marginBottom: 12 }}>
                        {ex.logged.map((s, i) => {
                          const hit = s.r >= pR;
                          const miss = s.r < pR - 1 || s.rpe > ex.rpe + 1;
                          return (
                            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "5px 0", borderBottom: i < ex.logged.length - 1 ? "1px solid #141414" : "none" }}>
                              <span style={{ ...MN, fontSize: 11, color: "#2a2a2a" }}>Set {i + 1}</span>
                              <span style={{ ...MN, fontSize: 13, color: "#777" }}>
                                {s.pr && <span style={{ color: "#fbbf24" }}>★ </span>}{s.w}kg × {s.r} <span style={{ color: "#3a3a3a" }}>RPE {s.rpe}</span>
                              </span>
                              <span style={{ fontSize: 14, color: hit ? "#4ade80" : miss ? "#f87171" : "#fbbf24" }}>{hit ? "✓" : miss ? "✗" : "~"}</span>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {ex.logged.length < ex.s && (
                      <div style={{ background: "#0c0c0c", border: `1px solid ${acc}44`, borderRadius: 14, padding: "18px 14px", marginBottom: 14, textAlign: "center" }}>
                        <div style={{ ...BB, fontSize: 10, letterSpacing: 4, color: "#333", marginBottom: 4 }}>SET {ex.logged.length + 1} OF {ex.s} — TARGET</div>
                        <div style={{ ...BB, fontSize: 62, color: acc, lineHeight: 1, letterSpacing: -1 }}>{ex.nextW}kg</div>
                        <div style={{ ...MN, fontSize: 22, color: "#999", marginTop: 2 }}>× {pR}</div>
                        <div style={{ ...MN, fontSize: 10, color: "#333", marginTop: 8 }}>Target RPE {ex.rpe}</div>
                        {ex.note && <div style={{ fontSize: 12, color: "#555", marginTop: 7, fontStyle: "italic" }}>{ex.note}</div>}
                      </div>
                    )}

                    {ex.logged.length < ex.s && (
                      <div>
                        <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                          {[["WEIGHT (kg)", lw, setLw, ex.nextW.toString()], ["REPS", lr, setLr, pR.toString()]].map(([label, val, setter, phh]) => (
                            <div key={label} style={{ flex: 1 }}>
                              <div style={{ ...MN, fontSize: 9, color: "#3a3a3a", marginBottom: 4, letterSpacing: 2 }}>{label}</div>
                              <input type="number" inputMode="numeric" value={val} onChange={e => setter(e.target.value)} placeholder={phh}
                                style={{ width: "100%", background: "#111", border: "1px solid #252525", borderRadius: 8, padding: "12px", color: "#fff", fontSize: 26, ...MN, textAlign: "center" }} />
                            </div>
                          ))}
                        </div>

                        <div style={{ marginBottom: 10 }}>
                          <div style={{ ...MN, fontSize: 9, color: "#3a3a3a", marginBottom: 5, letterSpacing: 2 }}>RPE</div>
                          <div style={{ display: "flex", gap: 4 }}>
                            {[6, 7, 8, 9, 10].map(r => (
                              <button key={r} onClick={() => setLrpe(r)}
                                style={{ flex: 1, padding: "11px 4px", background: lrpe === r ? acc : "#151515", border: `1px solid ${lrpe === r ? acc : "#252525"}`, borderRadius: 6, color: lrpe === r ? "#000" : "#555", fontSize: 16, fontWeight: 700 }}>{r}</button>
                            ))}
                          </div>
                        </div>

                        <div style={{ display: "flex", gap: 4, marginBottom: 8 }}>
                          {[[-5, "-5kg"], [-2.5, "-2.5"], [0, "Same"], [2.5, "+2.5"], [5, "+5kg"]].map(([d, lbl]) => (
                            <button key={lbl}
                              onClick={() => setLw(w => { const b = parseFloat(w) || ex.nextW; return d === 0 ? ex.nextW.toString() : (b + d).toString(); })}
                              style={{ flex: 1, background: "#151515", border: "1px solid #252525", borderRadius: 6, padding: "8px 2px", color: "#555", ...MN, fontSize: 11 }}>{lbl}</button>
                          ))}
                        </div>

                        <button onClick={handleLog}
                          style={{ width: "100%", padding: "18px", background: acc, border: "none", borderRadius: 10, color: "#000", fontSize: 20, fontWeight: 800, ...BB, letterSpacing: 3 }}>
                          LOG SET {ex.logged.length + 1}
                        </button>
                      </div>
                    )}

                    {ex.logged.length >= ex.s && (
                      <div style={{ textAlign: "center", padding: "13px", background: "#080f08", borderRadius: 8, border: "1px solid #1e3a1e" }}>
                        <span style={{ color: "#4ade80", ...BB, letterSpacing: 2, fontSize: 13 }}>✓ COMPLETE · {ex.vol.toFixed(0)}kg total volume</span>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}

          {!sdone && (
            <button onClick={endSession}
              style={{ width: "100%", marginTop: 8, padding: "14px", background: "transparent", border: "1px solid #1e1e1e", borderRadius: 10, color: "#444", fontSize: 14, marginBottom: 12 }}>
              End Session
            </button>
          )}

          {sdone && (
            <div style={{ background: "#111", border: "1px solid #222", borderRadius: 14, padding: "22px 16px", marginBottom: 12 }} className="slide-up">
              <div style={{ ...BB, fontSize: 24, letterSpacing: 3, color: acc, marginBottom: 16 }}>SESSION COMPLETE</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
                {[["Duration", `${durMin}m`], ["Volume", `${totalVol.toFixed(0)}kg`], ["Exercises", `${doneCount}/${sExs.length}`]].map(([l, v]) => (
                  <div key={l} style={{ background: "#0a0a0a", borderRadius: 8, padding: "10px 6px", textAlign: "center" }}>
                    <div style={{ fontSize: 10, color: "#444", marginBottom: 4 }}>{l}</div>
                    <div style={{ ...MN, fontSize: 16, color: "#fff" }}>{v}</div>
                  </div>
                ))}
              </div>
              {sExs.filter(e => e.logged.some(s => s.pr)).map(ex => (
                <div key={ex.n} style={{ background: "#0c0a00", border: "1px solid #fbbf2433", borderRadius: 8, padding: "8px 12px", marginBottom: 6 }}>
                  <span style={{ color: "#fbbf24", fontSize: 13 }}>★ PR — {ex.n}</span>
                </div>
              ))}
              <button onClick={() => { setMode("history"); setSExs([]); setSdone(false); }}
                style={{ width: "100%", marginTop: 10, padding: "13px", background: "transparent", border: `1px solid ${acc}55`, borderRadius: 10, color: acc, fontSize: 14, fontWeight: 700, ...BB, letterSpacing: 2 }}>
                VIEW PROGRESS
              </button>
              <button onClick={() => { setMode("program"); setSExs([]); setSdone(false); }}
                style={{ width: "100%", marginTop: 8, padding: "15px", background: acc, border: "none", borderRadius: 10, color: "#000", fontSize: 17, fontWeight: 700, ...BB, letterSpacing: 2 }}>
                BACK TO PROGRAM
              </button>
            </div>
          )}
        </div>
      )}

      {/* ══════════════ HISTORY VIEW ══════════════ */}
      {mode === "history" && (
        <div style={{ padding: "14px 14px 0" }}>
          <div style={{ ...BB, fontSize: 20, letterSpacing: 3, color: "#fff", marginBottom: 4 }}>PROGRESS</div>
          <div style={{ ...MN, fontSize: 10, color: "#444", marginBottom: 16 }}>Estimated 1RM per lift, session over session</div>

          {histRows.length === 0 ? (
            <div style={{ background: "#111", border: "1px dashed #222", borderRadius: 12, padding: "34px 18px", textAlign: "center" }}>
              <div style={{ fontSize: 30, marginBottom: 10 }}>📈</div>
              <div style={{ color: "#666", fontSize: 14, fontWeight: 600, marginBottom: 4 }}>No history yet</div>
              <div style={{ color: "#3a3a3a", fontSize: 12, lineHeight: 1.6 }}>Finish a session and your lifts will start charting here. Two or more sessions of a lift draws its trend line.</div>
            </div>
          ) : histRows.map(row => {
            const series = row.s.map(x => x.e1rm);
            const latest = series[series.length - 1];
            const prev = series.length > 1 ? series[series.length - 2] : null;
            const delta = prev != null ? Math.round((latest - prev) * 10) / 10 : null;
            const peak = Math.max(...series);
            const pAcc = PHASE_ACCENT[row.p] || acc;
            const isOpen = openHk === row.key;
            const trendColor = delta == null ? "#555" : delta > 0 ? "#4ade80" : delta < 0 ? "#f87171" : "#fbbf24";

            return (
              <div key={row.key} style={{ marginBottom: 8, border: "1px solid #1a1a1a", borderRadius: 12, overflow: "hidden" }}>
                <button onClick={() => setOpenHk(isOpen ? null : row.key)}
                  style={{ width: "100%", background: "#0f0f0f", padding: "13px 14px", display: "flex", justifyContent: "space-between", alignItems: "center", textAlign: "left" }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 3 }}>
                      <span style={{ width: 6, height: 6, borderRadius: 3, background: pAcc, flexShrink: 0 }} />
                      <span style={{ fontWeight: 600, fontSize: 14, color: "#eee", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.name}</span>
                    </div>
                    <div style={{ ...MN, fontSize: 10, color: "#444" }}>
                      {row.p.toUpperCase()} · Day {row.d} · {row.s.length} session{row.s.length > 1 ? "s" : ""}
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <Spark data={series} accent={pAcc} />
                    <div style={{ textAlign: "right", minWidth: 54 }}>
                      <div style={{ ...MN, fontSize: 16, color: "#fff", fontWeight: 600, lineHeight: 1 }}>{latest}</div>
                      <div style={{ ...MN, fontSize: 9, color: "#444", marginTop: 2 }}>est 1RM</div>
                      {delta != null && (
                        <div style={{ ...MN, fontSize: 10, color: trendColor, marginTop: 3 }}>
                          {delta > 0 ? "▲" : delta < 0 ? "▼" : "—"} {delta > 0 ? "+" : ""}{delta}
                        </div>
                      )}
                    </div>
                  </div>
                </button>

                {isOpen && (
                  <div className="fade-in" style={{ background: "#080808", padding: "14px", borderTop: "1px solid #1a1a1a" }}>
                    <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                      {[["Peak 1RM", `${peak}kg`], ["Best vol", `${(hist[row.key]?.bv || 0).toFixed(0)}kg`], ["Sessions", row.s.length]].map(([l, v]) => (
                        <div key={l} style={{ flex: 1, background: "#0f0f0f", borderRadius: 8, padding: "9px 6px", textAlign: "center" }}>
                          <div style={{ ...MN, fontSize: 15, color: "#eee" }}>{v}</div>
                          <div style={{ fontSize: 9, color: "#444", marginTop: 2 }}>{l}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ ...BB, fontSize: 10, letterSpacing: 3, color: "#333", marginBottom: 6 }}>SESSION LOG</div>
                    {[...row.s].reverse().map((s, i) => {
                      const isPeak = s.e1rm === peak;
                      return (
                        <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: i < row.s.length - 1 ? "1px solid #131313" : "none" }}>
                          <span style={{ ...MN, fontSize: 11, color: "#555" }}>{s.date || "—"}</span>
                          <span style={{ ...MN, fontSize: 11, color: "#777" }}>
                            {s.sets.map(x => `${x.w}×${x.r}`).join("  ")}
                          </span>
                          <span style={{ ...MN, fontSize: 11, color: isPeak ? "#fbbf24" : "#666" }}>
                            {isPeak && "★ "}{s.e1rm}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<GymApp />);
</script>
</body>
</html>
